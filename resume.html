<script>
  const words = ['already.', 'now.', 'for real.', 'please.', "i'm serious."];
  let i = 0;
  const swap = document.getElementById('loader-swap');
  let interval;

  setTimeout(() => {
    swap.textContent = words[0];
    swap.classList.add('visible');

    interval = setInterval(() => {
      swap.classList.remove('visible');
      swap.classList.add('fade');
      setTimeout(() => {
        i = (i + 1) % words.length;
        swap.textContent = words[i];
        swap.classList.remove('fade');
        swap.classList.add('visible');
      }, 300);
    }, 1500);
  }, 1600);

  window.addEventListener('load', () => {
    const loader = document.getElementById('loader');
    clearInterval(interval);
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 600);
  });
</script>
